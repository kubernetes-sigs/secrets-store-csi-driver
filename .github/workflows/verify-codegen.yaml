name: 'Ensure codegen works'
on: [pull_request]

permissions:
  contents: read

jobs:
  verify-codegen:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "^1.25"
      - name: Run codegens
        run: |
          make generate-protobuf
          make manifests
      - name: Verify git output
        shell: bash
        run: |
          if [ -n "$(git status -s)" ]; then
            echo 'Detected code generation changes'
            echo 'Make sure to run `make generate` and `make manifests` and commit those changes'
            git diff
            exit 1
          fi
